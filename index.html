<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Fetch API Button</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f0f0f0;
            padding: 20px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        #output {
            margin-top: 20px;
        }

        .card {
            background: white;
            margin: 10px;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body>

    <h2>Fetch Data Using Button</h2>

    <!-- BUTTON -->
    <button id="btn">Fetch Data</button>

    <!-- OUTPUT -->
    <div id="output"></div>

    <!-- LINK JS -->
    <script src="script.js"></script>

</body>

</html>
